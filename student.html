<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>WorkshopConnect - Student Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="login-card card">

        <h1>🎓 Student Login</h1>

        <p style="text-align:center; margin-bottom:20px;">

            Enter your details to join the workshop

        </p>

        <input
            type="text"
            id="studentName"
            placeholder="Student Name">

        <input
            type="text"
            id="studentRoll"
            placeholder="Roll Number">

        <input
            type="text"
            id="workshopCode"
            placeholder="Workshop Code">

        <button
            class="btn"
            onclick="joinWorkshop()">

            Join Workshop

        </button>

        <br><br>

        <div class="card">

            <h3>Workshop Information</h3>

            <br>

            <p>
                Workshop Code :
                <strong>WKC2026</strong>
            </p>

            <br>

            <p>
                Capacity :
                100+ Participants
            </p>

            <br>

            <p>
                Status :
                🟢 LIVE
            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
